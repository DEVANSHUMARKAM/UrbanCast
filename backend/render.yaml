services:
  - type: web
    name: urbangrowth-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 600
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: false
      - key: DEFAULT_CELL_SIZE_METERS
        value: 500
      - key: OSM_TIMEOUT
        value: 45
      - key: CORS_ORIGINS
        value: https://urbangrowth.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.9